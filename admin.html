<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Админка квеста</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    .admin-app {
          width: min(100%, 980px);
        }
        .admin-header {
          display: flex;
          justify-content: space-between;
          gap: 16px;
          align-items: flex-start;
          margin-bottom: 18px;
        }
        .admin-grid {
          display: grid;
          grid-template-columns: minmax(0, 1fr);
          gap: 14px;
        }
        .admin-section {
          padding: 16px;
          border: 1px solid var(--line);
          border-radius: 8px;
          background: #fffdf7;
          box-shadow: var(--shadow);
        }
        .admin-section h2 {
          margin-bottom: 12px;
        }
        .form-grid {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
          gap: 12px;
        }
        .form-grid.images {
          grid-template-columns: 1fr 1fr;
        }
        .form-grid.hint {
          grid-template-columns: 1fr 2fr;
        }
        select,
        textarea {
          width: 100%;
          min-height: 48px;
          border: 1px solid var(--line);
          border-radius: 8px;
          padding: 10px 13px;
          background: #fff;
          color: var(--ink);
        }
        textarea {
          min-height: 92px;
          resize: vertical;
        }
        .character-editor {
          display: grid;
          gap: 12px;
          padding: 0;
          border: 1px solid var(--line);
          border-radius: 8px;
          background: #fff;
          overflow: hidden;
        }
        .character-header-row {
          display: flex;
          justify-content: space-between;
          align-items: center;
          padding: 10px 14px;
          background: #f8f5ed;
          border-bottom: 1px solid var(--line);
          cursor: pointer;
        }
        .character-toggle {
          display: flex;
          align-items: center;
          gap: 8px;
          background: none;
          border: none;
          cursor: pointer;
          padding: 0;
          font: inherit;
          color: var(--ink);
        }
        .character-toggle .toggle-arrow {
          display: inline-block;
          transition: transform 0.2s ease;
          font-size: 0.7rem;
          color: var(--muted);
        }
        .character-editor.is-open .character-toggle .toggle-arrow {
          transform: rotate(90deg);
        }
        .character-toggle .character-title {
          font-size: 0.95rem;
        }
        .character-color-dot {
          display: inline-block;
          width: 14px;
          height: 14px;
          border-radius: 50%;
          border: 1px solid var(--line);
        }
        .character-delete-btn {
          min-height: 32px;
          padding: 0 12px;
          border: 1px solid #b94d3e;
          border-radius: 6px;
          background: #fffdf7;
          color: #b94d3e;
          font-weight: 700;
          font-size: 0.8rem;
          cursor: pointer;
        }
        .character-body {
          display: none;
          padding: 14px;
          gap: 12px;
        }
        .character-editor.is-open .character-body {
          display: grid;
        }
        .editor-list {
          display: grid;
          gap: 12px;
        }
        .admin-actions {
          display: flex;
          flex-wrap: wrap;
          gap: 10px;
        }
        .admin-tabs {
          display: flex;
          gap: 8px;
          margin-bottom: 14px;
        }
        .admin-tab {
          min-height: 44px;
          padding: 0 14px;
          border: 1px solid var(--line);
          border-radius: 8px;
          background: #fffdf7;
          color: var(--muted);
          font-weight: 900;
        }
        .admin-tab.is-active {
          background: #192027;
          color: #fffdf7;
        }
        .admin-panel[hidden] {
          display: none;
        }
        .players-table {
          width: 100%;
          border-collapse: collapse;
          overflow: hidden;
          border: 1px solid var(--line);
          border-radius: 8px;
          background: #fff;
        }
        .players-table th,
        .players-table td {
          padding: 10px;
          border-bottom: 1px solid var(--line);
          text-align: left;
          font-size: 0.9rem;
          vertical-align: middle;
        }
        .players-table th {
          color: var(--muted);
          font-size: 0.76rem;
          text-transform: uppercase;
        }
        .players-table .actions-cell {
          display: flex;
          gap: 6px;
          flex-wrap: wrap;
        }
        .players-table .actions-cell button {
          min-height: 32px;
          padding: 0 12px;
          border: 1px solid var(--line);
          border-radius: 6px;
          background: #fffdf7;
          font-weight: 700;
          font-size: 0.8rem;
          cursor: pointer;
        }
        .players-table .actions-cell .reset-btn {
          color: #d1663f;
          border-color: #d1663f;
        }
        .players-table .actions-cell .delete-btn {
          color: #b94d3e;
          border-color: #b94d3e;
        }
        .players-empty {
          color: var(--muted);
        }
        .admin-actions .secondary,
        .admin-actions .primary {
          width: auto;
          padding: 0 16px;
        }
        .admin-status {
          min-height: 24px;
          color: var(--green);
          font-weight: 800;
        }
        .image-preview {
          max-width: 60px;
          max-height: 60px;
          border: 1px solid var(--line);
          border-radius: 4px;
          object-fit: contain;
          background: #fff;
        }
        .hint-text {
          font-size: 0.8rem;
          color: var(--muted);
          font-weight: 400;
          margin-top: 4px;
        }
        .admin-map-wrap {
          position: relative;
          width: 100%;
          border: 1px solid var(--line);
          border-radius: var(--radius);
          overflow: hidden;
          background: #e8eef0;
          margin-bottom: 14px;
          box-shadow: var(--shadow-lg);
        }
        .admin-map {
          position: relative;
          width: 100%;
          min-height: 50vh;
          overflow: hidden;
          background: #e8eef0;
        }
        .admin-map-image {
          display: block;
          width: 100%;
          height: 100%;
          object-fit: contain;
          object-position: center;
        }
        #admin-pins {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          pointer-events: none;
        }
        .admin-pin {
          position: absolute;
          width: 52px;
          height: 52px;
          border-radius: 50%;
          transform: translate(-50%, -50%);
          cursor: grab;
          pointer-events: auto;
          overflow: hidden;
          background: transparent;
          border: none;
          box-shadow: none;
          transition: transform 0.1s;
        }
        .admin-pin:active {
          cursor: grabbing;
        }
        .admin-pin:hover {
          transform: translate(-50%, -50%) scale(1.1);
          z-index: 10;
        }
        .admin-pin img {
          width: 100%;
          height: 100%;
          object-fit: cover;
          display: block;
          pointer-events: none;
          border-radius: 50%;
        }
        .admin-pin .pin-fallback {
          width: 100%;
          height: 100%;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 1rem;
          font-weight: 900;
          color: #666;
          background: #e0e0e0;
          border-radius: 50%;
        }
        .admin-pin .pin-coords {
          position: absolute;
          bottom: -22px;
          left: 50%;
          transform: translateX(-50%);
          font-size: 0.7rem;
          color: var(--muted);
          background: rgba(255, 253, 247, 0.9);
          padding: 0 4px;
          border-radius: 3px;
          white-space: nowrap;
          pointer-events: none;
        }
        .admin-pin.dragging {
          opacity: 0.7;
          z-index: 100;
          cursor: grabbing;
        }
        .character-delete-btn {
          min-height: 36px;
          padding: 0 14px;
          border: 1px solid #b94d3e;
          border-radius: 6px;
          background: #fffdf7;
          color: #b94d3e;
          font-weight: 700;
          font-size: 0.85rem;
          cursor: pointer;
          justify-self: end;
        }
        .character-delete-btn:hover {
          background: #b94d3e;
          color: #fff;
        }
        .characters-header {
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 12px;
        }
        @media (max-width: 560px) {
          .admin-header {
                display: grid;
          }
          .admin-actions .secondary,
          .admin-actions .primary {
                width: 100%;
          }
          .players-table th,
          .players-table td {
                padding: 6px;
                font-size: 0.8rem;
          }
          .players-table .actions-cell button {
                font-size: 0.7rem;
                padding: 0 8px;
                min-height: 28px;
          }
          .form-grid.images {
                grid-template-columns: 1fr;
          }
          .form-grid.hint {
                grid-template-columns: 1fr;
          }
          .admin-pin {
                width: 8vmin;
                height: 8vmin;
                min-width: 30px;
                min-height: 30px;
                max-width: 50px;
                max-height: 50px;
          }
          .admin-pin .pin-coords {
                font-size: 8px;
                bottom: calc(-1.4 * 8vmin);
          }
        }
  </style>
</head>
<body>
<main class="app admin-app">
  <header class="admin-header">
    <div>
      <p class="eyebrow">Green Line Batumi</p>
      <h1>Админка квеста</h1>
    </div>
    <div class="admin-actions">
      <button class="primary" id="save-admin" type="button">Сохранить</button>
    </div>
  </header>

  <nav class="admin-tabs" aria-label="Разделы админки">
    <button class="admin-tab is-active" data-admin-tab="settings" type="button">Настройки</button>
    <button class="admin-tab" data-admin-tab="characters" type="button">Персонажи</button>
    <button class="admin-tab" data-admin-tab="map" type="button">Карта</button>
    <button class="admin-tab" data-admin-tab="players" type="button">Игроки</button>
  </nav>

  <!-- Настройки — только общие настройки, без персонажей -->
  <section class="admin-grid admin-panel" id="settings-panel">
    <div class="admin-section">
      <h2>Общие настройки</h2>
      <div class="form-grid">
        <label>
          Квест
          <select id="quest-status">
            <option value="active">Открыт</option>
            <option value="closed">Закрыт</option>
          </select>
        </label>
        <label>
          Погода сегодня
          <select id="current-weather">
            <option value="sun">Солнце</option>
            <option value="rain">Дождь</option>
            <option value="cloudy">Облачно</option>
          </select>
        </label>
        <label>
          Попыток на загадку
          <input id="max-attempts" inputmode="numeric" />
        </label>
        <label>
          Цифр в номере комнаты
          <input id="room-digits" inputmode="numeric" min="1" max="5" />
        </label>
        <label>
          Название финала
          <input id="finish-title" />
        </label>
      </div>
      <div class="form-grid">
        <label>
          Текст хорошего финала
          <textarea id="finish-success"></textarea>
        </label>
        <label>
          Текст ободряющего финала
          <textarea id="finish-support"></textarea>
        </label>
      </div>
      <label>
        Информация о призах
        <textarea id="prize-info" placeholder="Покажите этот текст гостю на финальном экране..."></textarea>
        <span class="hint-text">Отображается на финальном экране над кнопкой сохранения</span>
      </label>
      <label>
        Предупреждение при регистрации
        <textarea id="registration-warning" placeholder="Например: Игра доступна только для гостей отеля..."></textarea>
        <span class="hint-text">Показывается над кнопкой «Начать игру» на стартовой странице</span>
      </label>
      <label>
        Подсказка на карте
        <textarea id="scan-hint" placeholder="Ищите QR-код в отмеченной зоне и сканируйте его камерой телефона."></textarea>
        <span class="hint-text">Показывается под картой в виде информационного блока. Оставьте пустым для текста по умолчанию</span>
      </label>
      <label>
        Сообщение о закрытии квеста
        <textarea id="closed-message" placeholder="Квест временно закрыт. Следите за обновлениями!"></textarea>
        <span class="hint-text">Показывается на экране закрытия под картинкой</span>
      </label>
      <div class="form-grid">
        <label>
          Цвет фона кнопок
          <div style="display:flex;gap:8px;align-items:center;">
            <input id="primary-color" type="color" style="width:48px;height:40px;border:1px solid var(--line);border-radius:6px;padding:2px;cursor:pointer;" />
            <input id="primary-color-hex" type="text" placeholder="#29771e" style="flex:1;" />
          </div>
          <span class="hint-text">Применяется ко всем основным кнопкам. По умолчанию #29771e</span>
        </label>
        <label>
          Логотип отеля (URL)
          <input id="logo-url" placeholder="images/logo.png" />
          <span class="hint-text">Укажите путь к логотипу — он заменит букву «H» в шапке на всех страницах</span>
        </label>
      </div>
    </div>

    <p class="admin-status" id="admin-status" role="status"></p>
  </section>

  <!-- Персонажи — редактор списка персонажей -->
  <section class="admin-grid admin-panel" id="characters-panel" hidden>
    <div class="admin-section">
      <div class="characters-header">
        <h2>Персонажи</h2>
        <button class="secondary" id="add-character" type="button">Добавить персонажа</button>
      </div>
      <div class="editor-list" id="characters-editor"></div>
    </div>

    <p class="admin-status" id="characters-status" role="status"></p>
  </section>

  <!-- Карта -->
  <section class="admin-grid admin-panel" id="map-panel" hidden>
    <div class="admin-section">
      <h2>Редактор карты</h2>
      <p class="fineprint">Перетаскивайте персонажей по карте, чтобы задать их позиции. Координаты сохранятся автоматически при нажатии "Сохранить".</p>
      <div class="admin-map-wrap">
        <div class="admin-map" id="admin-map">
          <img class="admin-map-image" src="images/map-background.png" alt="Карта отеля" />
          <div id="admin-pins"></div>
        </div>
      </div>
      <button class="secondary" id="reset-positions" type="button">Сбросить позиции по умолчанию</button>
    </div>
  </section>

  <!-- Игроки -->
  <section class="admin-grid admin-panel" id="players-panel" hidden>
    <div class="admin-section">
      <div class="admin-header">
        <div>
          <h2>Игроки</h2>
          <p class="fineprint">Прогресс берется из событий квеста. В демо-режиме виден игрок этого браузера.</p>
        </div>
        <div class="admin-actions">
          <button class="secondary" id="reset-all-players" type="button">Сбросить всех</button>
          <button class="secondary" id="refresh-players" type="button">Обновить</button>
        </div>
      </div>
      <div id="players-content"></div>
    </div>
  </section>
</main>

<template id="character-template">
  <article class="character-editor">
    <div class="character-header-row">
      <button class="character-toggle" type="button" aria-label="Развернуть/свернуть">
        <span class="toggle-arrow">&#9654;</span>
        <strong class="character-title">Персонаж</strong>
        <span class="character-color-dot"></span>
      </button>
      <button class="character-delete-btn" data-action="delete-character" type="button">Удалить</button>
    </div>
    <div class="character-body">
    <div class="form-grid">
      <label>Включен<select data-field="enabled"><option value="true">Да</option><option value="false">Нет</option></select></label>
      <label>Активен<select data-field="active"><option value="true">Да</option><option value="false">Нет</option></select></label>
      <label>ID<input data-field="id" /><span class="hint-text">Уникальный идентификатор (латиницей, без пробелов)</span></label>
      <label>Имя<input data-field="name" /></label>
      <label>Цвет<input data-field="color" type="color" /></label>
      <label>X<input data-field="x" inputmode="numeric" /></label>
      <label>Y<input data-field="y" inputmode="numeric" /></label>
      <label>Погода<select data-field="weatherRule"><option value="any">Любая</option><option value="sun">Солнце</option><option value="rain">Дождь</option><option value="cloudy">Облачно</option></select></label>
      <label>Доступен с<input data-field="availableFrom" type="time" /></label>
      <label>Доступен до<input data-field="availableTo" type="time" /></label>
      <label>Баллы за находку<input data-field="foundPoints" inputmode="numeric" /></label>
      <label>Бонусы 1/2/3<input data-field="attemptPoints" placeholder="30,20,10" /></label>
    </div>
    <label>Загадка<textarea data-field="riddle"></textarea></label>
    <label>Ответы через запятую<textarea data-field="answers"></textarea></label>

    <!-- Изображения: обычное и решённое -->
    <div class="form-grid images">
      <label>
        URL изображения
        <input data-field="image" placeholder="images/persona-1.png" />
        <span class="hint-text">Картинка найденного персонажа</span>
      </label>
      <label>
        URL изображения (решено)
        <input data-field="imageSolved" placeholder="images/persona-1-solved.png" />
        <span class="hint-text">Картинка после решения загадки (другая поза)</span>
      </label>
    </div>

    <div class="form-grid hint">
      <label>
        Тип подсказки
        <select data-field="hintType">
          <option value="text">Текст</option>
          <option value="voice">Голос</option>
        </select>
      </label>
      <label>
        Текст подсказки
        <input data-field="hintText" placeholder="Нажми на меня, я шепну..." />
      </label>
    </div>
    <label>
      URL аудио для голосовой подсказки
      <input data-field="hintAudio" placeholder="voices/character-1.wav" />
      <span class="hint-text">Укажите путь к аудиофайлу (например voices/char-name.wav). Воспроизводится при типе подсказки «Голос»</span>
    </label>
    <label>
      Фраза, если персонаж уже найден
      <input data-field="hintFoundText" placeholder="Ты уже меня нашёл!" />
    </label>
    <label>
      Подсказка, если персонаж недоступен
      <input data-field="unavailableHint" placeholder="Приходи в солнечную погоду!" />
      <span class="hint-text">Показывается вместо «Персонаж недоступен». Укажите когда персонаж будет доступен</span>
    </label>

    </div>

    <!-- QR-код для персонажа -->
    <div class="qr-section" style="display:grid;gap:10px;padding:14px;border:1px solid var(--line);border-radius:8px;background:#fff;">
      <strong style="font-size:0.85rem;">QR-код персонажа</strong>
      <div class="qr-url-row" style="display:flex;gap:8px;align-items:center;">
        <code class="qr-url" style="flex:1;padding:8px 10px;border-radius:6px;background:#eef2f3;color:#2364aa;font-size:0.78rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;" title="Нажмите чтобы скопировать"></code>
        <button class="qr-copy-btn" type="button" style="min-height:36px;padding:0 12px;border:1px solid var(--line);border-radius:6px;background:#fffdf7;font-weight:700;font-size:0.8rem;cursor:pointer;">Копировать</button>
      </div>
      <div style="display:flex;gap:10px;align-items:center;">
        <canvas class="qr-canvas" width="160" height="160" style="border:1px solid var(--line);border-radius:6px;background:#fff;"></canvas>
        <div style="display:grid;gap:6px;">
          <button class="qr-download-btn" type="button" style="min-height:36px;padding:0 12px;border:1px solid var(--line);border-radius:6px;background:#fffdf7;font-weight:700;font-size:0.8rem;cursor:pointer;">Скачать PNG</button>
          <button class="qr-open-btn" type="button" style="min-height:36px;padding:0 12px;border:1px solid var(--line);border-radius:6px;background:#fffdf7;font-weight:700;font-size:0.8rem;cursor:pointer;">Открыть</button>
        </div>
      </div>
    </div>
  </article>
</template>

<script src="./config.js"></script>
<script src="./qr.js"></script>
<script src="./admin.js"></script>
</body>
</html>
