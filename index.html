<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#08080e">
<title>Матограф</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@900&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  height: 100%; background: #08080e; overflow: hidden;
  font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased;
}
.blob {
  position: fixed; border-radius: 50%;
  filter: blur(90px); pointer-events: none; z-index: 0;
  transition: opacity 1.2s ease;
}
.b1 {
  width: 340px; height: 340px;
  background: radial-gradient(circle, rgba(220,30,60,0.14) 0%, transparent 70%);
  top: -100px; left: 50%; transform: translateX(-50%);
}
.b2 {
  width: 280px; height: 280px;
  background: radial-gradient(circle, rgba(255,90,30,0.08) 0%, transparent 70%);
  bottom: 40px; right: -80px;
}
.b1.on { background: radial-gradient(circle, rgba(220,30,60,0.38) 0%, transparent 70%); }
.b2.on { background: radial-gradient(circle, rgba(255,90,30,0.22) 0%, transparent 70%); }

.wrap {
  position: relative; z-index: 1; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 2rem;
}
.title-block {
  display: flex; flex-direction: column; align-items: center;
  margin-bottom: 3rem; user-select: none;
}
.eyebrow {
  font-size: 10px; font-weight: 500; letter-spacing: 4px;
  text-transform: uppercase; color: rgba(255,255,255,0.18); margin-bottom: 8px;
}
.title {
  font-family: 'Unbounded', sans-serif; font-size: 40px;
  font-weight: 900; letter-spacing: -1.5px; line-height: 0.9;
  display: flex; flex-direction: column; align-items: center;
}
.t1 {
  background: linear-gradient(160deg, #fff 0%, rgba(255,255,255,0.5) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.t2 {
  background: linear-gradient(135deg, #ff2d4e 0%, #ff6820 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

#btn {
  position: relative; width: 220px; height: 220px;
  border-radius: 50%; border: none; background: none;
  cursor: pointer; margin-bottom: 2.5rem;
  display: flex; align-items: center; justify-content: center;
}
.ring {
  position: absolute; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.055);
  pointer-events: none; transition: border-color 0.4s;
}
.r1 { inset: 0; }
.r2 { inset: -18px; border-color: rgba(255,255,255,0.03); }
.r3 { inset: -36px; border-color: rgba(255,255,255,0.015); }
#btn.on .r1 { border-color: rgba(255,45,78,0.55); animation: rp 2s ease-out infinite; }
#btn.on .r2 { border-color: rgba(255,45,78,0.28); animation: rp 2s ease-out infinite 0.35s; }
#btn.on .r3 { border-color: rgba(255,45,78,0.13); animation: rp 2s ease-out infinite 0.7s; }
@keyframes rp {
  0%,100% { transform: scale(1); opacity: 1; }
  50%      { transform: scale(1.05); opacity: 0.5; }
}
.face {
  width: 168px; height: 168px; border-radius: 50%;
  background: linear-gradient(150deg, #191924 0%, #0d0d18 100%);
  border: 1px solid rgba(255,255,255,0.07);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 9px; position: relative; overflow: hidden;
  transition: border-color 0.4s, background 0.4s;
}
.face::before {
  content: ''; position: absolute; top: -35%; left: -35%;
  width: 70%; height: 70%;
  background: radial-gradient(circle, rgba(255,255,255,0.035) 0%, transparent 70%);
  pointer-events: none;
}
#btn.on .face {
  background: linear-gradient(150deg, #1e0d13 0%, #120810 100%);
  border-color: rgba(255,45,78,0.28);
}
.face-icon {
  font-size: 40px; line-height: 1;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
#btn.on .face-icon { transform: scale(1.2); }
.face-label {
  font-size: 10px; font-weight: 500; letter-spacing: 2.5px;
  text-transform: uppercase; color: rgba(255,255,255,0.28);
  transition: color 0.3s;
}
#btn.on .face-label { color: rgba(255,80,100,0.75); }

.counter-area {
  display: flex; flex-direction: column; align-items: center; gap: 5px; min-height: 66px;
}
#counter {
  font-family: 'Unbounded', sans-serif; font-size: 50px;
  font-weight: 900; letter-spacing: -3px;
  background: linear-gradient(135deg, #ff2d4e, #ff6820);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  opacity: 0; transform: translateY(10px); transition: opacity 0.4s, transform 0.4s;
}
#counter.show { opacity: 1; transform: translateY(0); }
#status {
  font-size: 12px; color: rgba(255,255,255,0.2);
  letter-spacing: 0.4px; min-height: 17px; transition: color 0.3s;
}
#status.hit { color: rgba(255,90,110,0.75); }
</style>
</head>
<body>

<div class="blob b1" id="b1"></div>
<div class="blob b2" id="b2"></div>

<div class="wrap">
  <div class="title-block">
    <div class="eyebrow">детектор мата</div>
    <div class="title">
      <span class="t1">МАТ</span>
      <span class="t2">ОГРАФ</span>
    </div>
  </div>

  <button id="btn" onclick="toggle()">
    <div class="ring r1"></div>
    <div class="ring r2"></div>
    <div class="ring r3"></div>
    <div class="face">
      <div class="face-icon" id="ficon">🎙</div>
      <div class="face-label" id="flabel">начать</div>
    </div>
  </button>

  <div class="counter-area">
    <div id="counter">0</div>
    <div id="status">нажмите, чтобы начать</div>
  </div>
</div>

<script>
/* ══ ВПИШИТЕ СВОЙ URL ══ */
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxY-Sxvy8IvyBX3TYqSAprY72atFyHBykLG1-l5L9_NuWydEbNRBDF5gfN4Qhf-fwcT/exec';

/* ══════════════════════════════════════════
   СЛОВАРИ — только самые сильные слова.
   Проверка идёт по ЦЕЛЫМ словам (не подстрокам):
   «хуй» не сработает на «тихуанский» или «уху».
   ══════════════════════════════════════════ */
var DICT = {
  ru: [
    'хуй','хуя','хую','хуем','хуёв','хуйня','хуйнёй','хуйней',
    'пизда','пизды','пизде','пизду','пиздой','пиздец','пиздёж','пиздёт','пиздит','пиздить','пиздато',
    'ёбаный','ёбаная','ёбаные','ёбаного','ёбаную','ёбать','ёбнуть','ёбнул','ёбнула',
    'еблан','ебало','ебать','ебал','ебала',
    'блядь','блядина','блядский','бляди','блядство',
    'мудак','мудаки','мудака','мудаку','мудаком',
    'залупа','залупу','залупой',
    'долбоёб','долбоёба','долбоёбу','долбоёбом',
    'пидор','пидора','пидору','пидором','пидорас','пидараса',
    'сука','суки','суку','сукой','суке',
    'ублюдок','ублюдка','ублюдку','ублюдком',
    'шлюха','шлюхи','шлюху','шлюхой',
    'манда','манду','мандой',
    'нахуй','похуй','захуй','ахуеть','ахуел','ахуела','охуеть','охуел','охуела',
    'заебал','заебала','заебали','заебись','заебать',
    'уёбок','уёбка','уёбку','уёбком',
    'выёбываться','выёбывается','въебать','въебал',
    'пиздануть','пизданул','пизданула',
    'ёбнуться','ёбнулся','ёбнулась',
    'бля','блять'
  ],
  uk: [
    'хуй','хуя','хую','хуєм','хуйня',
    'пизда','пізди','пізді','пізду','піздою','піздець','піздить',
    'їбати','їбав','їбала','їбаний','їбана','їбані',
    'блядь','блядина','блядський','бляді',
    'мудак','мудаки','мудака','мудаку','мудаком',
    'залупа','залупу','залупою',
    'довбойоб','довбойоба','довбойобу',
    'підор','підора','підорас','підараса',
    'сука','суки','суку','сукою',
    'шльоха','шльохи','шльоху','шльохою',
    'курва','курви','курву','курвою',
    'манда','манду','мандою',
    'нахуй','похуй','захуй','охуіти','охуів','охуіла',
    'заїбав','заїбала','заїбали','заїбись',
    'уйобок','уйобка','уйобку',
    'бля','блять'
  ],
  en: [
    'fuck','fucks','fucked','fucking','fucker','fuckers','fuckup','fuckface',
    'motherfuck','motherfucker','motherfucking','motherfuckers',
    'shit','shits','shitted','shitting','shitty','bullshit','horseshit',
    'cunt','cunts','cunting',
    'cock','cocks','cocksucker','cocksucking',
    'dick','dicks','dickhead','dickheads',
    'ass','asses','asshole','assholes','asshat','asswipe',
    'bitch','bitches','bitching','bitched','son of a bitch',
    'bastard','bastards',
    'whore','whores','whorish',
    'slut','sluts','slutty',
    'prick','pricks',
    'twat','twats',
    'pussy','pussies',
    'wanker','wankers','wanking',
    'faggot','faggots',
    'nigger','niggers',
    'crap','crappy',
    'damn','goddamn','goddamned',
    'piss','pissed','pissing','pissoff'
  ],
  ka: [
    'ბოზი','ბოზო','ბოზობა','ნაბოზევი','ბოზის შვილი',
    'ჭყლეტი','შაშვი','ძაღლის შვილი','ჯანდაბა','გამიქრი',
    'დედაშენი','დედამოვტყან','დედამოვარდინე',
    'ტრაკი','ტრაკში','მიყიდე','გათხოვდი'
  ]
};

/* Языковые маркеры */
var LANG_RE = {
  ka: /[\u10D0-\u10FF]/,
  uk: /[іїєґ]/i,
  ru: /[а-яёА-ЯЁ]/,
  en: /[a-zA-Z]/
};
var LANG_LABELS = { ru:'Русский', uk:'Українська', en:'English', ka:'ქართული' };

function detectLang(text) {
  for (var l in LANG_RE) { if (LANG_RE[l].test(text)) return l; }
  return 'ru';
}

/* ══ Поиск ЦЕЛЫХ слов ══
   Разбиваем текст на токены по пробелам и знакам препинания,
   затем сравниваем каждый токен с каждым словом из словаря.
   Это исключает ложные срабатывания на подстроки.          */
function tokenize(text) {
  return text.toLowerCase()
    .replace(/[^а-яёa-zіїєґ\u10D0-\u10FF\s]/gi, ' ')
    .split(/\s+/)
    .filter(function(w) { return w.length > 0; });
}

function findBadWord(text, lang) {
  var tokens = tokenize(text);
  var dict = DICT[lang] || [];
  /* Строим Set для быстрого поиска */
  var tokenSet = {};
  tokens.forEach(function(t) { tokenSet[t] = true; });
  for (var i = 0; i < dict.length; i++) {
    var w = dict[i].toLowerCase();
    /* Многословные выражения — проверяем через includes */
    if (w.indexOf(' ') !== -1) {
      if (text.toLowerCase().includes(w)) return dict[i];
    } else {
      if (tokenSet[w]) return dict[i];
    }
  }
  return null;
}

/* ══ Состояние ══ */
var listening = false, rec = null, total = 0, lat = '', lng = '';
var silentCtx = null; /* AudioContext для подавления пиликанья */

if (navigator.geolocation) {
  navigator.geolocation.watchPosition(
    function(p) { lat = p.coords.latitude.toFixed(6); lng = p.coords.longitude.toFixed(6); },
    function() {}, { enableHighAccuracy: true }
  );
}

/* Создаём тихий AudioContext — браузер на iOS/Android не пикает
   когда есть активный аудио-граф                              */
function keepSilent() {
  try {
    var AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    silentCtx = new AC();
    var osc = silentCtx.createOscillator();
    var gain = silentCtx.createGain();
    gain.gain.value = 0; /* абсолютная тишина */
    osc.connect(gain);
    gain.connect(silentCtx.destination);
    osc.start();
  } catch(e) {}
}

/* ══ Распознавание ══ */
function initRec() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { setStatus('браузер не поддерживает речь', false); return; }
  rec = new SR();
  rec.lang = 'ru-RU';
  rec.continuous = false;   /* на телефоне continuous = бесконечные пики */
  rec.interimResults = false;
  rec.maxAlternatives = 1;

  rec.onresult = function(e) {
    for (var i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) analyze(e.results[i][0].transcript);
    }
  };
  rec.onerror = function(ev) {
    if (ev.error === 'no-speech' || ev.error === 'aborted') { restartSoon(); return; }
    restartSoon(1200);
  };
  rec.onend = function() { restartSoon(); };
}

var restartTimer = null;
function restartSoon(ms) {
  clearTimeout(restartTimer);
  if (!listening) return;
  restartTimer = setTimeout(function() {
    if (!listening) return;
    try { rec.start(); } catch(e) {}
  }, ms || 80);
}

function toggle() {
  if (!rec) { initRec(); }
  var btn = document.getElementById('btn');
  if (listening) {
    listening = false;
    clearTimeout(restartTimer);
    try { rec.stop(); rec.abort(); } catch(e) {}
    btn.classList.remove('on');
    document.getElementById('b1').classList.remove('on');
    document.getElementById('b2').classList.remove('on');
    document.getElementById('ficon').textContent = '🎙';
    document.getElementById('flabel').textContent = 'начать';
    setStatus('нажмите, чтобы начать', false);
  } else {
    keepSilent();
    listening = true;
    try { rec.start(); } catch(e) {}
    btn.classList.add('on');
    document.getElementById('b1').classList.add('on');
    document.getElementById('b2').classList.add('on');
    document.getElementById('ficon').textContent = '🔴';
    document.getElementById('flabel').textContent = 'слушаю';
    setStatus('слушаю…', false);
  }
}

/* ══ Анализ ══ */
function analyze(text) {
  var lang = detectLang(text);
  var word = findBadWord(text, lang);
  if (word) hit(word, text, lang);
}

function hit(word, context, lang) {
  total++;
  var cnt = document.getElementById('counter');
  cnt.textContent = total;
  cnt.classList.add('show');
  setStatus('поймал: «' + word + '»', true);
  setTimeout(function() { if (listening) setStatus('слушаю…', false); }, 2500);
  var now = new Date();
  send({
    word: word,
    lang: LANG_LABELS[lang] || lang,
    date: now.toLocaleDateString('ru-RU'),
    time: now.toLocaleTimeString('ru-RU'),
    lat: lat, lng: lng,
    context: context.slice(0, 150)
  });
}

/* ══ Google Sheets ══ */
function send(data) {
  if (!SCRIPT_URL || SCRIPT_URL.indexOf('ВАШ') !== -1) return;
  fetch(SCRIPT_URL, {
    method: 'POST', mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  }).catch(function() {});
}

function setStatus(txt, isHit) {
  var el = document.getElementById('status');
  el.textContent = txt;
  el.className = isHit ? 'hit' : '';
}
</script>
</body>
</html>
